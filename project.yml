name: DailyTodo
options:
  bundleIdPrefix: com.dylanlandman
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.2"
    CURRENT_PROJECT_VERSION: "10"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic            # Xcode manages provisioning (incl. the App Group)
    DEVELOPMENT_TEAM: "Z78633LQDS"        # signing team used for TestFlight distribution
    TARGETED_DEVICE_FAMILY: "1"           # iPhone

targets:
  DailyTodo:
    type: application
    platform: iOS
    sources:
      - DailyTodo
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylanlandman.dailytodo
        CODE_SIGN_ENTITLEMENTS: DailyTodo/DailyTodo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_TESTABILITY: YES
    info:
      path: DailyTodo/Info.plist
      properties:
        CFBundleDisplayName: 1List
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        NSSupportsLiveActivities: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.dylanlandman.dailytodo
            CFBundleURLSchemes:
              - dailytodo
    dependencies:
      - target: DailyTodoWidgets
    scheme:
      testTargets:
        - DailyTodoTests
        - DailyTodoUITests
      gatherCoverageData: false

  DailyTodoWidgets:
    type: app-extension
    platform: iOS
    sources:
      - DailyTodoWidgets
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylanlandman.dailytodo.DailyTodoWidgets
        CODE_SIGN_ENTITLEMENTS: DailyTodoWidgets/DailyTodoWidgets.entitlements
    info:
      path: DailyTodoWidgets/Info.plist
      properties:
        CFBundleDisplayName: 1List
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  DailyTodoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DailyTodoTests
    dependencies:
      - target: DailyTodo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylanlandman.dailytodo.tests
        GENERATE_INFOPLIST_FILE: YES

  DailyTodoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - DailyTodoUITests
    dependencies:
      - target: DailyTodo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylanlandman.dailytodo.uitests
        GENERATE_INFOPLIST_FILE: YES
